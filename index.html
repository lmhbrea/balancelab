<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BalanceLab - TTK Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>BalanceLab</h1>
        <p class="subtitle">Time-To-Kill Calculator (v0.1)</p>

        <div class="input-group">
            <label>Damage per Shot</label>
            <input type="number" id="damage" min="0" step="any">
        </div>

        <div class="input-group">
            <label>Fire Rate (RPM)</label>
            <input type="number" id="rpm" min="0" step="any">
        </div>

        <div class="input-group">
            <label>Target HP</label>
            <input type="number" id="hp" min="0" step="any">
        </div>

        <button onclick="calculateTTK()">Calculate</button>

        <div class="results">
            <p>Shots to Kill: <span id="shots">-</span></p>
            <p>Time to Kill (seconds): <span id="ttk">-</span></p>
            <p>DPS: <span id="dps">-</span></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
