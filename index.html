<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BalanceLab TTK Calculator v0.1</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">

        <h1>TTK Calculator v0.1</h1>

        <div class="input-group">
            <label>
                Damage:
                <input type="number" id="damage" value="100">
            </label>

            <label>
                RPM:
                <input type="number" id="rpm" value="600">
            </label>

            <label>
                Target HP:
                <input type="number" id="hp" value="1000">
            </label>
        </div>

        <button id="calculate-btn">Calculate</button>
        <button id="reset-btn">Reset</button>

        <div id="result"></div>

        <hr>

        <button id="pro-feature-btn">Pro Feature Coming Soon</button>

    </div>

    <script src="script.js"></script>
</body>
</html>
